<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Learning Center{% endblock %}</title>
    <!-- Dyslexia-Friendly Fonts (Lexend) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Dyslexia Global Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dyslexia.css') }}">
    <!-- Calculator Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/calculator.css') }}">
    <!-- Chatbot Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chatbot.css') }}">
    
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <!-- Page Content -->
    {% block content %}{% endblock %}
    
    <!-- Calculator JS -->
    <script src="{{ url_for('static', filename='js/calculator.js') }}"></script>
    <script>
        // Initialize calculator if function exists
        if(typeof createCalculatorHTML === 'function') {
            createCalculatorHTML();
        }
    </script>

    <!-- Chatbot JS -->
    <script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
