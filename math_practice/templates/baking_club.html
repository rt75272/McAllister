{% extends "base.html" %}

{% block title %}Baking Club - Learning Center{% endblock %}

{% block extra_styles %}
    <style>
        body {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }
        
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1em;
            padding: 0.5em 1em;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            text-decoration: none;
            border-radius: 0.5em;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: white;
        }
        
        .hero-section {
            background-color: white;
            padding: 3em;
            border-radius: 1em;
            box-shadow: 0 0 2em rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 2em;
        }
        
        .hero-title {
            font-size: 2.5em;
            color: #d81b60;
            margin-bottom: 0.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .hero-subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 1.5em;
        }

        .padlet-container {
            background: white;
            padding: 1em;
            border-radius: 1em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2em;
            }
            .hero-section {
                padding: 2em 1em;
            }
        }
    </style>
{% endblock %}

{% block content %}
    <div class="main-container">
        <a href="{{ url_for('home') }}" class="back-link">← Back to Home</a>
        
        <!-- Hero Section -->
        <div class="hero-section">
            <h1 class="hero-title">🧁 Baking Club</h1>
            <p class="hero-subtitle">Share your favorite recipes, pictures, and tips with other baking enthusiasts!</p>
        </div>

        <!-- Padlet Plugin -->
        <div class="padlet-container">
            <div class="padlet-embed" style="border:1px solid rgba(0,0,0,0.1);border-radius:2px;box-sizing:border-box;overflow:hidden;position:relative;width:100%;background:#F4F4F4">
                <p style="padding:0;margin:0">
                    <iframe src="https://padlet.com/embed/vxnq55sz8nmthlow" frameborder="0" allow="camera;microphone;geolocation;display-capture;clipboard-write" style="width:100%;height:608px;display:block;padding:0;margin:0"></iframe>
                </p>
                <div style="display:flex;align-items:center;justify-content:end;margin:0;padding:8px 8px 8px 0">
                    <a href="https://padlet.com?ref=embed" style="display:flex;align-items:center;gap:5px;flex-grow:0;margin:0;border:none;padding:0;text-decoration:none" target="_blank">
                        <span aria-hidden style="color:#9E9E9E;font-size:10px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1">Made with</span>
                        <img src="https://padlet.net/emails/padlet_email_logo_2026_text-dark-200.png" height="12" style="padding:0;margin:0;background:0 0;border:none;box-shadow:none;display:block" alt="Made with Padlet">
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
